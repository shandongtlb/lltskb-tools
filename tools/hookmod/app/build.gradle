plugins {
    id 'com.android.application'
}

android {
    namespace 'com.lltimg.hook'
    compileSdk 36

    defaultConfig {
        applicationId "com.lltimg.hook"
        minSdk 28
        targetSdk 36
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    buildFeatures {
        buildConfig false
    }
}

dependencies {
    // Xposed API：编译期可见，运行期由 LSPosed 提供，不打进 APK。
    compileOnly files('libs/api-82.jar')
}
